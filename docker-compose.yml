services:
  redis:
    image: redis:7-alpine
    command: redis-server /usr/local/etc/redis/redis.conf
    volumes:
      - ./redis/redis.conf:/usr/local/etc/redis/redis.conf
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - app-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  miner:
    build: ./miner
    environment:
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      - REDIS_HOST=redis
    networks:
      - app-net
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  visualizer:
    build: ./visualizer
    environment:
      - REDIS_HOST=redis
      - DEFAULT_TOP_N=10
    ports:
      - "8501:8501"
      - "8000:8000"
    networks:
      - app-net
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

networks:
  app-net:
    driver: bridge

volumes:
  redis_data:
